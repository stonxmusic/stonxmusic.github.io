<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Logo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
            overflow: hidden;
        }
        .glitch {
            position: relative;
            cursor: pointer;
        }
        .glitch img {
            width: 300px; /* Adjust as needed */
            animation: glitch-animation 0.5s infinite;
        }
        @keyframes glitch-animation {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-2px, 2px); opacity: 0.8; }
            40% { transform: translate(2px, -2px); opacity: 1; }
            60% { transform: translate(-2px, 2px); opacity: 0.9; }
            80% { transform: translate(2px, -2px); opacity: 1; }
            100% { transform: translate(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="glitch" onclick="window.location.href='https://www.instagram.com/stonx_music';">
        <img src="1000006075-removebg-preview (1).png" alt="Glitching Logo">
    </div>
</body>
</html>
