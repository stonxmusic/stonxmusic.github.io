<!-- RUG PULL Button -->
<div class="container mt-5" id="rug-pull-section">
    <button class="btn btn-danger btn-lg" id="rugpull">RUG PULL</button>
</div>

<!-- RUG PULL - After Click -->
<div class="container mt-5" id="rug-pull-activated" style="display: none;">
    <button class="btn btn-primary btn-lg" id="go-back">Go Back</button>
    <h1>RUG PULLED. LMAO.</h1>
    <p>Thanks for your investment, nerd.</p>
</div>

<!-- Scripts -->
<script>
    // Rug Pull Button (Chaos Mode)
    $("#rugpull").click(function() {
        $("body").css("background-color", "red");
        $("#rug-pull-section").hide(); // Hide the original section
        $("#rug-pull-activated").show(); // Show the rug pull section
    });

    // Go Back Button
    $("#go-back").click(function() {
        $("body").css("background-color", "black");
        $("#rug-pull-section").show(); // Show the original section again
        $("#rug-pull-activated").hide(); // Hide the rug pull section
    });

    // GSAP Animation for Hero Section
    gsap.from(".hero h1, .hero h3, .hero .price, .hero .btn-buy", {
        duration: 1,
        y: -50,
        opacity: 0,
        stagger: 0.2,
        ease: "bounce.out"
    });

    // Fake Price Ticker (Randomized)
    function updatePrice() {
        let newPrice = (Math.random() * (420 - 0.69) + 0.69).toFixed(3);
        $(".price").text("$" + newPrice);
    }
    setInterval(updatePrice, 2000);

    // Buy Now Button - Play Airhorn Sound
    $("#buy-now").click(function() {
        let airhorn = new Audio("https://www.myinstants.com/media/sounds/airhorn.mp3");
        airhorn.play();
        alert("You are now financially obligated to ride the bassline to the moon.");
    });
</script>
